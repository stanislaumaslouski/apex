version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # FastAPI приложение
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_app
    ports:
      - "8000:8000"
    environment:
      # Передаем переменные окружения напрямую
      DATABASE_URL: postgresql://postgres:password@postgres:5432/crm_db
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Для разработки (горячая перезагрузка)
    # Для продакшена используйте команду без --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - crm_network

  # PgAdmin для управления базой данных (опционально)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - crm_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  crm_network:
    driver: bridgeF

volumes:
  postgres_data:
  pgadmin_data: